function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,300,600].forEach(delay=>{
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;
      o.type='sine';
      g.gain.setValueAtTime(0.3,ctx.currentTime+delay/1000);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay/1000+0.3);
      o.start(ctx.currentTime+delay/1000);
      o.stop(ctx.currentTime+delay/1000+0.3);
    });
  }catch(e){}
}
function tryRealNotification(title,body){
  if("Notification" in window && Notification.permission==="granted"){
    try{ new Notification(title,{body,tag:"prodesk-"+Date.now()}); }catch(e){}
  }
}
function requestNotifPermission(cb){
  if(!("Notification" in window)){cb(false);return;}
  if(Notification.permission==="granted"){cb(true);return;}
  if(Notification.permission==="denied"){cb(false);return;}
  Notification.requestPermission().then(p=>cb(p==="granted"));
}
const alarmTimers=[];
function clearAlarms(){alarmTimers.forEach(t=>clearTimeout(t));alarmTimers.length=0;}
function scheduleAlarm(title,body,delayMs,onAlarm){
  if(delayMs>0){
    const t=setTimeout(()=>{playBeep();tryRealNotification(title,body);onAlarm(title,body);},delayMs);
    alarmTimers.push(t);
  }
}
function scheduleTaskReminder(task,onAlarm){
  if(!task.due||task.due==="TBD"||task.done)return;
  const due=new Date(task.due);
  const parts=task.time?task.time.split(":").map(Number):[9,0];
  due.setHours(parts[0],parts[1],0,0);
  const now=new Date();
  const remind=new Date(due.getTime()-15*60*1000);
  const delay=remind-now;
  if(delay>0) scheduleAlarm("📋 Task Starting Soon!",`"${task.title}" starts in 15 mins at ${task.time||"09:00"}`,delay,onAlarm);
  const dayBefore=new Date(due);
  dayBefore.setDate(due.getDate()-1);
  dayBefore.setHours(9,0,0,0);
  const d1=dayBefore-now;
  if(d1>0) scheduleAlarm("📋 Task Due Tomorrow!",`"${task.title}" is due tomorrow at ${task.time||"09:00"}`,d1,onAlarm);
}
function scheduleMeetingReminder(meeting,onAlarm){
  if(!meeting.time)return;
  const now=new Date();
  const t=new Date();
  const parts=meeting.time.split(":").map(Number);
  t.setHours(parts[0],parts[1],0,0);
  const remind=new Date(t.getTime()-15*60*1000);
  const delay=remind-now;
  if(delay>0) scheduleAlarm("📅 Meeting in 15 mins!",`"${meeting.title}" starts at ${meeting.time}`,delay,onAlarm);
}
function nextOccurrence(dateStr,repeat){
  const d=new Date(dateStr);
  if(repeat==="Daily") d.setDate(d.getDate()+1);
  else if(repeat==="Weekly") d.setDate(d.getDate()+7);
  else if(repeat==="Monthly") d.setMonth(d.getMonth()+1);
  else return null;
  return d.toISOString().slice(0,10);
}

function MsgModal({member,userUid,onClose}){

    if(!input.trim())return;
    const msg={text:input,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};

    setConvo(updated);localStore.set(key,updated);setInput("");

    <Modal title={"Message "+member.name} onClose={onClose}>

function MainApp({user,onLogout}){

      {id:2,title:"Set up your team",due:"2026-03-10",time:"09:00",priority:"Medium",done:false,repeat:"None"},
    ],
    meetings:[{id:1,time:"10:00",title:"Team Kickoff",people:4,color:C.blue,repeat:"None"}],
    team:[],
    notifs:[],
  };

  const [meetings,setMeetingsRaw]=useState(defaults.meetings);
  const [team,setTeamRaw]=useState(defaults.team);
  const [notifs,setNotifsRaw]=useState(defaults.notifs);

  const docRef=window._db.collection("prodesk_users").doc(user.uid);

  // Real-time Firestore sync
  useEffect(()=>{
    const unsub=docRef.onSnapshot(snap=>{
      if(snap.exists){
        const d=snap.data();
        setTasksRaw(d.tasks||defaults.tasks);
        setMeetingsRaw(d.meetings||defaults.meetings);
        setTeamRaw(d.team||defaults.team);
        setNotifsRaw(d.notifs||defaults.notifs);
      } else {
        docRef.set(defaults);
      }
      setLoaded(true);
    },err=>{console.log("Firestore error",err);setLoaded(true);});
    return unsub;
  },[]);

  function saveAll(next){
    docRef.set(next,{merge:true}).catch(e=>console.log("save err",e));
  }
  function setTasks(fn){setTasksRaw(prev=>{const next=fn(prev);saveAll({tasks:next});return next;});}
  function setMeetings(fn){setMeetingsRaw(prev=>{const next=fn(prev);saveAll({meetings:next});return next;});}
  function setTeam(fn){setTeamRaw(prev=>{const next=fn(prev);saveAll({team:next});return next;});}
  function setNotifs(fn){setNotifsRaw(prev=>{const next=fn(prev);saveAll({notifs:next});return next;});}

  const [showTask,setShowTask]=useState(false);

  const [showMember,setShowMember]=useState(false);
  const [showNotifs,setShowNotifs]=useState(false);

  const [msgTarget,setMsgTarget]=useState(null);

  const [editMeetingId,setEditMeetingId]=useState(null);

  const [nTitle,setNTitle]=useState("");const [nDue,setNDue]=useState("");const [nTime,setNTime]=useState("09:00");const [nPri,setNPri]=useState("Medium");const [nRepeat,setNRepeat]=useState("None");

  const [mbName,setMbName]=useState("");const [mbRole,setMbRole]=useState("");

  const [search,setSearch]=useState("");
  const [filterPri,setFilterPri]=useState("All");

  const [alarm,setAlarm]=useState(null);
  const [notifStatus,setNotifStatus]=useState(("Notification" in window)?Notification.permission:"unsupported");

  function onAlarm(title,body){setAlarm({title,body});}
  function snoozeAlarm(){
    const a=alarm;
    setAlarm(null);
    setTimeout(()=>{playBeep();tryRealNotification(a.title,a.body);setAlarm(a);},15*60*1000);
  }

  },[tasks,meetings]);

  const unread=notifs.filter(n=>!n.read).length;

  const openTasks=tasks.filter(t=>!t.done).length;

  function openNewTask(){setEditTaskId(null);setNTitle("");setNDue("");setNTime("09:00");setNPri("Medium");setNRepeat("None");setShowTask(true);}

    setShowMeeting(false);setEditMeetingId(null);

  function openNewMember(){setEditMemberId(null);setMbName("");setMbRole("");setShowMember(true);}

  function saveMember(){
    if(!mbName.trim())return;
    if(editMemberId){
      const init=mbName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
      setTeam(tm=>tm.map(m=>m.id===editMemberId?{...m,name:mbName,role:mbRole||"Team Member",init}:m));
      setNotifs(ns=>[{id:Date.now(),text:`${mbName}'s profile updated.`,read:false},...ns.slice(0,19)]);
    } else {
      const bgs=[C.purple,C.cyan,C.amber,C.green,C.red,C.blue];
      const init=mbName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
      setTeam(tm=>[...tm,{id:Date.now(),name:mbName,role:mbRole||"Team Member",init,online:false,bg:bgs[tm.length%bgs.length]}]);
      setNotifs(ns=>[{id:Date.now(),text:`${mbName} added to your team.`,read:false},...ns.slice(0,19)]);
    }
    setShowMember(false);setEditMemberId(null);
  }

  const card={background:C.white,borderRadius:16,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:`1px solid ${C.border}`,marginBottom:12};
  const row={display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12};

  const filteredTasks=tasks.filter(t=>{
    const matchSearch=t.title.toLowerCase().includes(search.toLowerCase());
    const matchPri=filterPri==="All"||t.priority===filterPri;
    return matchSearch&&matchPri;
  });

  if(!loaded){
    return(
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",flexDirection:"column",gap:12,background:C.white}}>
        <div style={{fontSize:36}}>☁️</div>
        <p style={{color:C.muted,fontSize:13}}>Syncing your workspace...</p>
      </div>
    );
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",position:"relative"}}>
      <div style={{background:C.navy,padding:"10px 24px 6px",display:"flex",justifyContent:"space-between"}}>
        <span style={{color:"#fff",fontSize:11,fontWeight:600}}>ProDesk ☁️</span>
        <span style={{color:"#fff",fontSize:11}}>⚡</span>
      </div>
      {notifStatus!=="granted"&&notifStatus!=="unsupported"&&(
        <div style={{background:"#FEF3C7",padding:"10px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:"#92400E",fontWeight:600}}>🔔 Get real phone alerts too</span>
          <button onClick={enableNotifs} style={{background:C.amber,color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Enable</button>
        </div>
      )}
      <div style={{background:C.navy,padding:"12px 20px 20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <p style={{color:"#94A3B8",fontSize:11,margin:0,letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600}}>Workspace</p>
            <h2 style={{color:"#fff",margin:"2px 0 0",fontSize:18,fontWeight:700}}>Hello, {user.name.split(" ")[0]} 👋</h2>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <button onClick={()=>setShowNotifs(true)} style={{position:"relative",background:"rgba(255,255,255,0.1)",border:"none",borderRadius:10,width:36,height:36,cursor:"pointer",fontSize:15,color:"#fff"}}>
              🔔
              {unread>0&&<span style={{position:"absolute",top:-4,right:-4,background:C.red,color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{unread}</span>}
            </button>
            <button onClick={()=>setShowProfile(true)} style={{border:"none",background:"none",cursor:"pointer",padding:0}}>
              <Avatar init={initials} size={36} bg={C.blue}/>
            </button>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:16,overflowX:"auto",paddingBottom:2}}>
          {[{label:"Done",value:doneTasks},{label:"Open",value:openTasks},{label:"Meetings",value:meetings.length},{label:"Team",value:team.length}].map((st,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,0.08)",borderRadius:14,padding:"10px 14px",minWidth:72,flexShrink:0,border:"1px solid rgba(255,255,255,0.08)"}}>
              <div style={{color:"#fff",fontSize:20,fontWeight:700,lineHeight:1}}>{st.value}</div>
              <div style={{color:"#94A3B8",fontSize:9.5,marginTop:3,textTransform:"uppercase",letterSpacing:"0.05em",fontWeight:600}}>{st.label}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,display:"flex"}}>
        {["Dashboard","Tasks","Calendar","Team"].map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{flex:1,padding:"12px 4px",fontSize:11,fontWeight:tab===i?700:500,color:tab===i?C.blue:C.muted,background:"none",border:"none",cursor:"pointer",borderBottom:tab===i?`2.5px solid ${C.blue}`:"2.5px solid transparent"}}>
            {t}
          </button>
        ))}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px 16px 80px"}}>
        {tab===0&&(
          <div>
            <div style={card}>
              <div style={row}>
                <span style={{fontSize:13,fontWeight:700,color:C.text}}>Task Completion</span>
                <span style={{fontSize:13,fontWeight:800,color:C.blue}}>{completionRate}%</span>
              </div>
              <div style={{background:C.slateLight,borderRadius:8,height:10,overflow:"hidden",marginBottom:14}}>
                <div style={{background:C.blue,height:"100%",width:completionRate+"%",borderRadius:8,transition:"width 0.3s"}}/>
              </div>
              <div style={{display:"flex",gap:8}}>
                {["High","Medium","Low"].map(p=>(
                  <div key={p} style={{flex:1,background:PRI[p].bg,borderRadius:10,padding:"8px 6px",textAlign:"center"}}>
                    <div style={{fontSize:16,fontWeight:800,color:PRI[p].col}}>{priCounts[p]}</div>
                    <div style={{fontSize:9,color:PRI[p].col,fontWeight:700,textTransform:"uppercase"}}>{p}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={card}>
              <div style={row}>
                <span style={{fontSize:13,fontWeight:700,color:C.text}}>Priority Tasks</span>
                <button onClick={()=>setTab(1)} style={{fontSize:11,color:C.blue,background:"none",border:"none",cursor:"pointer",fontWeight:600}}>View All</button>
              </div>
              {tasks.filter(t=>t.priority==="High"&&!t.done).length===0&&<p style={{fontSize:12,color:C.muted,textAlign:"center",padding:"8px 0"}}>No high priority tasks!</p>}
              {tasks.filter(t=>t.priority==="High"&&!t.done).map(t=>(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div onClick={()=>toggleTaskDone(t)} style={{width:18,height:18,borderRadius:5,border:`2px solid ${t.done?C.blue:C.border}`,background:t.done?C.blue:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                    {t.done&&<span style={{color:"#fff",fontSize:10}}>✓</span>}
                  </div>
                  <div style={{flex:1}} onClick={()=>openEditTask(t)}>
                    <div style={{fontSize:12.5,fontWeight:600,color:t.done?C.muted:C.text,textDecoration:t.done?"line-through":"none"}}>{t.title}{t.repeat&&t.repeat!=="None"?" 🔁":""}</div>
                    <div style={{fontSize:10.5,color:C.muted,marginTop:1}}>Due {t.due} {t.time?"· "+t.time:""}</div>
                  </div>
                  <Badge label={t.priority} bg={PRI[t.priority].bg} col={PRI[t.priority].col}/>
                </div>
              ))}
            </div>
            <div style={card}>
              <div style={row}>
                <span style={{fontSize:13,fontWeight:700,color:C.text}}>Today's Schedule</span>
                <button onClick={openNewMeeting} style={{fontSize:11,color:C.blue,background:"none",border:"none",cursor:"pointer",fontWeight:600}}>+ Add</button>
              </div>
              {meetings.length===0&&<p style={{fontSize:12,color:C.muted,textAlign:"center",padding:"8px 0"}}>No meetings today.</p>}
              {meetings.slice(0,3).map(m=>(
                <div key={m.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <div style={{width:3,height:36,borderRadius:4,background:m.color,flexShrink:0}}/>
                  <div style={{flex:1}} onClick={()=>openEditMeeting(m)}>
                    <div style={{fontSize:12.5,fontWeight:600,color:C.text}}>{m.title}{m.repeat&&m.repeat!=="None"?" 🔁":""}</div>
                    <div style={{fontSize:10.5,color:C.muted}}>{m.time} · {m.people} attendees</div>
                  </div>
                  <button style={smBtn(C.blueLight,C.blue)}>Join</button>
                </div>
              ))}
            </div>
            <div style={card}>
              <span style={{fontSize:13,fontWeight:700,color:C.text}}>Quick Actions</span>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:12}}>
                {[
                  {icon:"📋",label:"New Task",bg:C.blueLight,col:C.blue,action:openNewTask},
                  {icon:"📅",label:"Schedule",bg:"#F0FDF4",col:C.green,action:openNewMeeting},
                  {icon:"👥",label:"Add Member",bg:"#F5F3FF",col:C.purple,action:openNewMember},
                  {icon:"👤",label:"Profile",bg:C.amberBg,col:C.amber,action:()=>setShowProfile(true)},
                ].map((a,i)=>(
                  <button key={i} onClick={a.action} style={{background:a.bg,border:`1px solid ${a.col}22`,borderRadius:12,padding:"12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:18}}>{a.icon}</span>
                    <span style={{fontSize:12,fontWeight:700,color:a.col}}>{a.label}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        {tab===1&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:14,fontWeight:700,color:C.text}}>{openTasks} Open Tasks</span>
              <button onClick={openNewTask} style={{background:C.blue,color:"#fff",border:"none",borderRadius:10,padding:"6px 14px",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ New</button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search tasks..." style={{flex:1,padding:"9px 12px",borderRadius:10,border:`1px solid ${C.border}`,fontSize:12,background:C.white,outline:"none"}}/>
              <select value={filterPri} onChange={e=>setFilterPri(e.target.value)} style={{padding:"9px 10px",borderRadius:10,border:`1px solid ${C.border}`,fontSize:12,background:C.white,outline:"none"}}>

              </select>
            </div>
            {filteredTasks.length===0&&<div style={{...card,textAlign:"center",padding:32}}><div style={{fontSize:32}}>📋</div><p style={{color:C.muted,fontSize:13,marginTop:8}}>No matching tasks.</p></div>}
            {filteredTasks.map(t=>(
              <div key={t.id} style={{background:C.white,borderRadius:14,padding:"12px 14px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:6,marginBottom:10,opacity:t.done?0.6:1}}>
                <div onClick={()=>toggleTaskDone(t)} style={{width:20,height:20,borderRadius:6,border:`2px solid ${t.done?C.blue:C.border}`,background:t.done?C.blue:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                  {t.done&&<span style={{color:"#fff",fontSize:11}}>✓</span>}
                </div>
                <div style={{flex:1,minWidth:0}} onClick={()=>openEditTask(t)}>
                  <div style={{fontSize:13,fontWeight:600,color:C.text,textDecoration:t.done?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}{t.repeat&&t.repeat!=="None"?" 🔁":""}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>Due {t.due} {t.time?"· "+t.time:""}</div>
                </div>
                <Badge label={t.priority} bg={PRI[t.priority].bg} col={PRI[t.priority].col}/>
                <a href={waLink(`Reminder: "${t.title}" is due ${t.due}${t.time?" at "+t.time:""}`)} target="_blank" rel="noopener" style={{...iconBtn,textDecoration:"none"}}>📲</a>
                <button onClick={()=>openEditTask(t)} style={iconBtn}>✏️</button>
                <button onClick={()=>setTasks(ts=>ts.filter(x=>x.id!==t.id))} style={iconBtn}>🗑️</button>
              </div>
            ))}
          </div>
        )}

        {tab===2&&(
          <div>
            <div style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <button style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:C.muted}}>‹</button>
                <span style={{fontWeight:700,fontSize:14,color:C.text}}>March 2026</span>
                <button style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:C.muted}}>›</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,textAlign:"center"}}>
                {DAYS.map((d,i)=><div key={i} style={{fontSize:10,fontWeight:700,color:C.muted,padding:"2px 0"}}>{d}</div>)}
                {CAL.map((d,i)=><div key={i} style={{fontSize:12,padding:"5px 2px",borderRadius:8,background:d==="9"?C.blue:"transparent",color:d==="9"?"#fff":d?C.text:"transparent",fontWeight:d==="9"?700:400,cursor:d?"pointer":"default"}}>{d}</div>)}
              </div>
            </div>
            <div style={card}>
              <div style={row}>
                <span style={{fontSize:13,fontWeight:700,color:C.text}}>Meetings</span>
                <button onClick={openNewMeeting} style={{fontSize:11,color:C.blue,background:"none",border:"none",cursor:"pointer",fontWeight:600}}>+ Add</button>
              </div>
              {meetings.length===0&&<p style={{fontSize:12,color:C.muted,textAlign:"center",padding:"8px 0"}}>No meetings scheduled.</p>}
              {meetings.map(m=>(
                <div key={m.id} style={{display:"flex",gap:6,padding:"10px 12px",background:C.slateLight,borderRadius:12,borderLeft:`3px solid ${m.color}`,marginBottom:8,alignItems:"center"}}>
                  <div style={{minWidth:40}}><div style={{fontSize:13,fontWeight:700,color:C.text}}>{m.time}</div></div>
                  <div style={{flex:1,minWidth:0}} onClick={()=>openEditMeeting(m)}>
                    <div style={{fontSize:13,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.title}{m.repeat&&m.repeat!=="None"?" 🔁":""}</div>
                    <div style={{fontSize:11,color:C.muted}}>{m.people} attendees</div>
                  </div>
                  <a href={waLink(`Meeting reminder: "${m.title}" at ${m.time}`)} target="_blank" rel="noopener" style={{...iconBtn,textDecoration:"none"}}>📲</a>
                  <button style={smBtn(m.color,"#fff")}>Join</button>
                  <button onClick={()=>openEditMeeting(m)} style={iconBtn}>✏️</button>
                  <button onClick={()=>setMeetings(ms=>ms.filter(x=>x.id!==m.id))} style={iconBtn}>🗑️</button>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab===3&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:14,fontWeight:700,color:C.text}}>{team.length} Members</span>
              <button onClick={openNewMember} style={{background:C.blue,color:"#fff",border:"none",borderRadius:10,padding:"6px 14px",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Add</button>
            </div>
            {team.length===0&&<div style={{...card,textAlign:"center",padding:32}}><div style={{fontSize:32}}>👥</div><p style={{color:C.muted,fontSize:13,marginTop:8}}>Add your first team member!</p></div>}
            {team.map(m=>(
              <div key={m.id} style={{background:C.white,borderRadius:14,padding:"12px 14px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                <div style={{position:"relative"}}>
                  <Avatar init={m.init} size={40} bg={m.bg}/>
                  <div onClick={()=>setTeam(tm=>tm.map(x=>x.id===m.id?{...x,online:!x.online}:x))} style={{position:"absolute",bottom:0,right:0,width:10,height:10,borderRadius:"50%",background:m.online?"#10B981":"#CBD5E1",border:"2px solid #fff",cursor:"pointer"}}/>
                </div>
                <div style={{flex:1,minWidth:0}} onClick={()=>openEditMember(m)}>
                  <div style={{fontSize:13,fontWeight:700,color:C.text}}>{m.name}</div>
                  <div style={{fontSize:11,color:C.muted}}>{m.role}</div>
                </div>
                <button onClick={()=>setMsgTarget(m)} style={smBtn(C.blueLight,C.blue)}>Message</button>
                <button onClick={()=>openEditMember(m)} style={iconBtn}>✏️</button>
                <button onClick={()=>setTeam(tm=>tm.filter(x=>x.id!==m.id))} style={iconBtn}>🗑️</button>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{position:"absolute",bottom:0,left:0,right:0,background:C.navy,display:"flex",justifyContent:"space-around",padding:"8px 0 16px",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
        {[{icon:"⊞",label:"Home"},{icon:"✓",label:"Tasks"},{icon:"📅",label:"Cal"},{icon:"👥",label:"Team"}].map((n,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"6px 12px",color:tab===i?C.blue:"rgba(255,255,255,0.5)"}}>
            <span style={{fontSize:18}}>{n.icon}</span>
            <span style={{fontSize:9,fontWeight:tab===i?700:400,letterSpacing:"0.06em",textTransform:"uppercase"}}>{n.label}</span>
          </button>
        ))}
      </div>

      {alarm&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:C.white,borderRadius:20,padding:24,width:"100%",boxShadow:"0 8px 32px rgba(0,0,0,0.3)"}}>
            <div style={{fontSize:40,textAlign:"center",marginBottom:12}}>⏰</div>
            <div style={{fontSize:16,fontWeight:800,color:C.text,textAlign:"center",marginBottom:8}}>{alarm.title}</div>
            <div style={{fontSize:13,color:C.muted,textAlign:"center",marginBottom:24,lineHeight:1.5}}>{alarm.body}</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={snoozeAlarm} style={{flex:1,background:C.amberBg,color:C.amber,border:`1px solid ${C.amber}`,borderRadius:12,padding:"12px",fontWeight:700,fontSize:13,cursor:"pointer"}}>⏰ Snooze 15 min</button>
              <button onClick={dismissAlarm} style={{flex:1,background:C.blue,color:"#fff",border:"none",borderRadius:12,padding:"12px",fontWeight:700,fontSize:13,cursor:"pointer"}}>✓ Dismiss</button>
            </div>
          </div>
        </div>
      )}

      {showNotifs&&(
        <Modal title="Notifications" onClose={()=>setShowNotifs(false)}>
          <button onClick={()=>setNotifs(ns=>ns.map(n=>({...n,read:true})))} style={{fontSize:11,color:C.blue,background:"none",border:"none",cursor:"pointer",fontWeight:600,marginBottom:8,display:"block",marginLeft:"auto"}}>Mark all read</button>
          {notifs.length===0&&<p style={{fontSize:12,color:C.muted,textAlign:"center"}}>No notifications.</p>}
          {notifs.map(n=>(
            <div key={n.id} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:n.read?"transparent":C.blue,marginTop:5,flexShrink:0,border:`1px solid ${n.read?C.border:C.blue}`}}/>
              <span style={{fontSize:13,color:n.read?C.muted:C.text,fontWeight:n.read?400:600}}>{n.text}</span>
            </div>
          ))}
        </Modal>
      )}

      {showProfile&&(
        <Modal title="My Profile" onClose={()=>setShowProfile(false)}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,paddingBottom:8}}>
            <Avatar init={initials} size={64} bg={C.blue}/>
            <div style={{textAlign:"center"}}>
              <div style={{fontWeight:700,fontSize:16,color:C.text}}>{user.name}</div>
              <div style={{fontSize:12,color:C.muted,marginTop:2}}>{user.email}</div>
              <div style={{fontSize:11,color:C.green,marginTop:4,fontWeight:600}}>☁️ Synced to cloud</div>
            </div>
            <div style={{width:"100%",background:C.slateLight,borderRadius:12,padding:14}}>
              <div style={{display:"flex",justifyContent:"space-around"}}>
                {[{label:"Tasks",value:tasks.length},{label:"Done",value:doneTasks},{label:"Team",value:team.length}].map((s,i)=>(
                  <div key={i} style={{textAlign:"center"}}>
                    <div style={{fontSize:20,fontWeight:700,color:C.blue}}>{s.value}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2,fontWeight:600}}>{s.label}</div>
                  </div>
                ))}
              </div>
            </div>
            {notifStatus!=="granted"&&notifStatus!=="unsupported"&&(
              <button onClick={enableNotifs} style={sBtn(C.amber)}>🔔 Enable Phone Notifications</button>
            )}
            {notifStatus==="granted"&&(
              <div style={{fontSize:12,color:C.green,fontWeight:600}}>✓ Phone notifications enabled</div>
            )}
            <button onClick={onLogout} style={sBtn(C.redBg,C.red)}>Sign Out</button>
          </div>
        </Modal>
      )}

      {showTask&&(
        <Modal title={editTaskId?"Edit Task":"New Task"} onClose={()=>{setShowTask(false);setEditTaskId(null);}}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <FInput placeholder="Task title" value={nTitle} onChange={setNTitle}/>
            <FInput placeholder="Due date" value={nDue} onChange={setNDue} type="date"/>
            <FInput placeholder="Time" value={nTime} onChange={setNTime} type="time"/>
            <FSelect value={nPri} onChange={setNPri} options={["High","Medium","Low"]}/>
            <div>
              <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>🔁 Repeat</div>
              <FSelect value={nRepeat} onChange={setNRepeat} options={REPEAT_OPTS}/>
            </div>
            <button onClick={saveTask} style={sBtn(C.blue)}>{editTaskId?"Save Changes":"Add Task"}</button>
          </div>
        </Modal>
      )}
      {showMeeting&&(
        <Modal title={editMeetingId?"Edit Meeting":"New Meeting"} onClose={()=>{setShowMeeting(false);setEditMeetingId(null);}}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <FInput placeholder="Meeting title" value={mTitle} onChange={setMTitle}/>
            <FInput placeholder="Time" value={mTime} onChange={setMTime} type="time"/>
            <FInput placeholder="Attendees" value={mPeople} onChange={setMPeople} type="number"/>
            <div>
              <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>🔁 Repeat</div>
              <FSelect value={mRepeat} onChange={setMRepeat} options={REPEAT_OPTS}/>
            </div>
            <button onClick={saveMeeting} style={sBtn(C.blue)}>{editMeetingId?"Save Changes":"Add Meeting"}</button>
          </div>
        </Modal>
      )}
      {showMember&&(
        <Modal title={editMemberId?"Edit Member":"Add Team Member"} onClose={()=>{setShowMember(false);setEditMemberId(null);}}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <FInput placeholder="Full name" value={mbName} onChange={setMbName}/>
            <FInput placeholder="Role / Title" value={mbRole} onChange={setMbRole}/>
            <button onClick={saveMember} style={sBtn(C.blue)}>{editMemberId?"Save Changes":"Add Member"}</button>
          </div>
        </Modal>
      )}
      {msgTarget&&<MsgModal member={msgTarget} userUid={user.uid} onClose={()=>setMsgTarget(null)}/>}
    </div>
  );
}

function Root(){
  const [screen,setScreen]=useState(()=>localStore.get("pd_onboarded")?"loading":"onboarding");
  const [user,setUser]=useState(null);

  useEffect(()=>{
    const unsub=window._auth.onAuthStateChanged(fbUser=>{
      if(fbUser){
        setUser({uid:fbUser.uid,name:fbUser.displayName||fbUser.email.split("@")[0],email:fbUser.email});
        setScreen("app");
      } else {
        setUser(null);
        setScreen(localStore.get("pd_onboarded")?"auth":"onboarding");
      }
    });
    return unsub;
  },[]);

  function handleLogout(){window._auth.signOut();}

  return(
    <div style={{width:"100%",maxWidth:480,height:"100vh",overflow:"hidden",display:"flex",flexDirection:"column",position:"relative",background:C.white}}>
      {screen==="loading"&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",flexDirection:"column",gap:12}}>
          <div style={{fontSize:36}}>⚡</div>
        </div>
      )}
      {screen==="onboarding"&&<Onboarding onDone={()=>{localStore.set("pd_onboarded",true);setScreen("auth");}}/>}
      {screen==="auth"&&<Auth/>}
      {screen==="app"&&user&&<MainApp user={user} onLogout={handleLogout}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
