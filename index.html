function getCalendarDays(year,month){
  const firstDay=new Date(year,month,1).getDay();
  const offset=firstDay===0?6:firstDay-1;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const cells=[];
  for(let i=0;i<offset;i++) cells.push("");
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  return cells;
}

function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,300,600].forEach(delay=>{
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;
      o.type='sine';
      g.gain.setValueAtTime(0.3,ctx.currentTime+delay/1000);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay/1000+0.3);
      o.start(ctx.currentTime+delay/1000);
      o.stop(ctx.currentTime+delay/1000+0.3);
    });
  }catch(e){}
}
function tryRealNotification(title,body){
  if("Notification" in window && Notification.permission==="granted"){

function requestNotifPermission(cb){
  if(!("Notification" in window)){cb(false);return;}
  if(Notification.permission==="granted"){cb(true);return;}
  if(Notification.permission==="denied"){cb(false);return;}
  Notification.requestPermission().then(p=>cb(p==="granted"));
}
const alarmTimers=[];
function clearAlarms(){alarmTimers.forEach(t=>clearTimeout(t));alarmTimers.length=0;}
function scheduleAlarm(title,body,delayMs,onAlarm){
  if(delayMs>0){
    const t=setTimeout(()=>{playBeep();tryRealNotification(title,body);onAlarm(title,body);},delayMs);
    alarmTimers.push(t);
  }
}
function scheduleTaskReminder(task,onAlarm){
  if(!task.due||task.due==="TBD"||task.done)return;
  const due=new Date(task.due);
  const parts=task.time?task.time.split(":").map(Number):[9,0];
  due.setHours(parts[0],parts[1],0,0);
  const now=new Date();
  const delayExact=due.getTime()-now.getTime();
  if(delayExact>0) scheduleAlarm("🔴 Task Due Now!",`"${task.title}" is due now at ${task.time||"09:00"}`,delayExact,onAlarm);
  const remind=new Date(due.getTime()-15*60*1000);
  const delay15=remind.getTime()-now.getTime();
  if(delay15>0) scheduleAlarm("📋 Task Starting Soon!",`"${task.title}" starts in 15 mins at ${task.time||"09:00"}`,delay15,onAlarm);
  const dayBefore=new Date(due);
  dayBefore.setDate(due.getDate()-1);
  dayBefore.setHours(9,0,0,0);
  const d1=dayBefore.getTime()-now.getTime();
  if(d1>0) scheduleAlarm("📋 Task Due Tomorrow!",`"${task.title}" is due tomorrow at ${task.time||"09:00"}`,d1,onAlarm);
}
function scheduleMeetingReminder(meeting,onAlarm){
  if(!meeting.time)return;
  const now=new Date();
  const t=new Date();
  const parts=meeting.time.split(":").map(Number);
  t.setHours(parts[0],parts[1],0,0);
  const delayExact=t.getTime()-now.getTime();
  if(delayExact>0) scheduleAlarm("🔴 Meeting Starting Now!",`"${meeting.title}" is starting now`,delayExact,onAlarm);
  const remind=new Date(t.getTime()-15*60*1000);
  const delay15=remind.getTime()-now.getTime();
  if(delay15>0) scheduleAlarm("📅 Meeting in 15 mins!",`"${meeting.title}" starts at ${meeting.time}`,delay15,onAlarm);
}
function nextOccurrence(dateStr,repeat){
  const d=new Date(dateStr);
  if(repeat==="Daily") d.setDate(d.getDate()+1);
  else if(repeat==="Weekly") d.setDate(d.getDate()+7);
  else if(repeat==="Monthly") d.setMonth(d.getMonth()+1);
  else return null;
  return d.toISOString().slice(0,10);
}
function waLink(text){return "https://wa.me/?text="+encodeURIComponent(text);}
function pad2(n){return String(n).padStart(2,"0");}
function toCalStamp(dateStr,timeStr){
  const parts=dateStr.split("-").map(Number);
  const tparts=(timeStr||"09:00").split(":").map(Number);
  const dt=new Date(parts[0],parts[1]-1,parts[2],tparts[0],tparts[1]);
  return dt.getFullYear()+pad2(dt.getMonth()+1)+pad2(dt.getDate())+"T"+pad2(dt.getHours())+pad2(dt.getMinutes())+"00";
}
function toCalStampPlusMins(dateStr,timeStr,mins){
  const parts=dateStr.split("-").map(Number);
  const tparts=(timeStr||"09:00").split(":").map(Number);
  const dt=new Date(parts[0],parts[1]-1,parts[2],tparts[0],tparts[1]);
  dt.setMinutes(dt.getMinutes()+mins);
  return dt.getFullYear()+pad2(dt.getMonth()+1)+pad2(dt.getDate())+"T"+pad2(dt.getHours())+pad2(dt.getMinutes())+"00";
}
function gcalLink(title,details,dateStr,timeStr,durationMins){
  if(!dateStr||dateStr==="TBD")return "#";
  const start=toCalStamp(dateStr,timeStr);
  const end=toCalStampPlusMins(dateStr,timeStr,durationMins);
  const params="action=TEMPLATE&text="+encodeURIComponent(title)+"&dates="+start+"/"+end+"&details="+encodeURIComponent(details||"");
  return "https://calendar.google.com/calendar/render?"+params;
}
function extractiveSummary(text,maxSentences){
  maxSentences=maxSentences||3;
  const sentences=(text||"").split(/(?<=[.!?])\s+/).filter(function(s){return s.trim().length>3;});
  if(sentences.length<=maxSentences) return text;
  const words=(text.toLowerCase().match(/\b\w+\b/g))||[];
  const freq={};
  words.forEach(function(w){if(w.length>3) freq[w]=(freq[w]||0)+1;});
  const scored=sentences.map(function(s){
    const sw=(s.toLowerCase().match(/\b\w+\b/g))||[];
    const score=sw.reduce(function(sum,w){return sum+(freq[w]||0);},0)/(sw.length||1);
    return {s:s,score:score};
  });
  const sorted=scored.slice().sort(function(a,b){return b.score-a.score;});
  const top=sorted.slice(0,maxSentences).map(function(x){return x.s;});
  return sentences.filter(function(s){return top.indexOf(s)!==-1;}).join(" ");
}
async function aiSummarize(text){
  try{
    const res=await fetch("/.netlify/functions/summarize",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text:text})
    });
    const data=await res.json();
    if(!res.ok||!data.summary){
      return {ok:false,summary:extractiveSummary(text,3),fallback:true};
    }
    return {ok:true,summary:data.summary,fallback:false};
  }catch(e){
    return {ok:false,summary:extractiveSummary(text,3),fallback:true};
  }
}
async function scanReceipt(base64,mimeType,categories){
  try{
    const res=await fetch("/.netlify/functions/scan-receipt",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({image:base64,mimeType:mimeType,categories:categories})
    });
    const data=await res.json();
    if(!res.ok) return {ok:false,error:(data.error||"Scan failed")+" (status "+res.status+")"};
    return {ok:true,amount:data.amount||0,category:data.category||categories[0],merchant:data.merchant||""};
  }catch(e){
    return {ok:false,error:"Network error: "+e.message};
  }
}
function fileToBase64(file){
  return new Promise(function(resolve,reject){
    const reader=new FileReader();
    reader.onload=function(){resolve(reader.result.split(",")[1]);};
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}
function compressImageBase64(base64,mimeType,maxWidth){
  maxWidth=maxWidth||800;
  return new Promise(function(resolve){
    const img=new Image();
    img.onload=function(){
      let w=img.width,h=img.height;
      if(w>maxWidth){h=Math.round(h*(maxWidth/w));w=maxWidth;}
      const canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL("image/jpeg",0.6);
      resolve(compressed);
    };
    img.onerror=function(){resolve("data:"+mimeType+";base64,"+base64);};
    img.src="data:"+mimeType+";base64,"+base64;
  });
}
function startVoiceInput(onResult,onEnd){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("Voice input isn't supported on this browser. Try Chrome.");return null;}
  const rec=new SR();
  rec.continuous=true;
  rec.interimResults=false;
  rec.lang="en-US";
  rec.onresult=function(e){
    let text="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      text+=e.results[i][0].transcript+" ";
    }
    onResult(text);
  };
  rec.onend=function(){if(onEnd) onEnd();};
  rec.onerror=function(){if(onEnd) onEnd();};
  rec.start();
  return rec;
}

function Auth(){
  const [mode,setMode]=useState("login");
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);

  function handleSubmit(){
    setErr("");
    if(!email.trim()||!pass.trim()){setErr("Please fill all fields.");return;}
    if(mode==="signup"&&!name.trim()){setErr("Please enter your name.");return;}
    if(pass.length<6){setErr("Password must be at least 6 characters.");return;}
    setBusy(true);
    if(mode==="signup"){
      window._auth.createUserWithEmailAndPassword(email,pass)
        .then(function(cred){return cred.user.updateProfile({displayName:name.trim()});})
        .catch(function(e){setErr(e.message);setBusy(false);});
    } else {
      window._auth.signInWithEmailAndPassword(email,pass)
        .catch(function(e){setErr(e.message);setBusy(false);});
    }
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.white}}>
      <div style={{background:C.navy,padding:"48px 32px 32px",textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:8}}>⚡</div>
        <h1 style={{color:"#fff",margin:0,fontSize:28,fontWeight:800}}>ProDesk</h1>
        <p style={{color:"#94A3B8",margin:"6px 0 0",fontSize:12}}>Cloud-synced productivity workspace</p>
      </div>
      <div style={{flex:1,padding:24,display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",background:C.slateLight,borderRadius:12,padding:4}}>
          {["login","signup"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,padding:"9px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,background:mode===m?C.white:"transparent",color:mode===m?C.blue:C.muted,boxShadow:mode===m?"0 1px 4px rgba(0,0,0,0.1)":"none"}}>
              {m==="login"?"Sign In":"Create Account"}
            </button>
          ))}
        </div>
        {mode==="signup"&&<FInput placeholder="Full Name" value={name} onChange={setName}/>}
        <FInput placeholder="Email address" value={email} onChange={setEmail} type="email"/>
        <FInput placeholder="Password (min 6 chars)" value={pass} onChange={setPass} type="password"/>
        {err&&<div style={{background:C.redBg,color:C.red,padding:"8px 12px",borderRadius:8,fontSize:12,fontWeight:600}}>{err}</div>}
        <button onClick={handleSubmit} disabled={busy} style={Object.assign({},sBtn(C.blue),{marginTop:4,opacity:busy?0.6:1})}>{busy?"Please wait...":(mode==="login"?"Sign In":"Create Account")}</button>
        <p style={{color:C.muted,fontSize:11,textAlign:"center",margin:0}}>☁️ Your data syncs securely across all your devices.</p>
      </div>
    </div>
  );
}

function MsgModal({member,userUid,onClose}){
  const key="pd_msg_"+userUid+"_"+member.id;
  const [input,setInput]=useState("");
  const [convo,setConvo]=useState(function(){return localStore.get(key)||[];});
  function send(){
    if(!input.trim())return;
    const msg={text:input,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};
    const updated=convo.concat([msg]);
    setConvo(updated);localStore.set(key,updated);setInput("");
  }
  return(
    <Modal title={"Message "+member.name} onClose={onClose}>
      <div style={{minHeight:120,maxHeight:180,overflowY:"auto",marginBottom:12,display:"flex",flexDirection:"column",gap:8}}>
        {convo.length===0&&<p style={{color:C.muted,fontSize:12,textAlign:"center",marginTop:20}}>No messages yet. Say hi!</p>}
        {convo.map((msg,i)=>(
          <div key={i} style={{alignSelf:"flex-end",background:C.blue,color:"#fff",borderRadius:"12px 12px 2px 12px",padding:"8px 12px",maxWidth:"80%"}}>
            <div style={{fontSize:12}}>{msg.text}</div>
            <div style={{fontSize:9,opacity:0.7,marginTop:2,textAlign:"right"}}>{msg.time}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")send();}} placeholder="Type a message..." style={{flex:1,padding:"10px 12px",borderRadius:10,border:"1px solid "+C.border,fontSize:13,outline:"none"}}/>
        <button onClick={send} style={{background:C.blue,color:"#fff",border:"none",borderRadius:10,padding:"10px 16px",cursor:"pointer",fontWeight:700}}>Send</button>
      </div>
    </Modal>
  );
}

    try{
      const base64=await fileToBase64(file);
      const compressed=await compressImageBase64(base64,file.type,800);
      setExReceiptImg(compressed);
      const result=await scanReceipt(base64,file.type,categories);
      if(result.ok){
        if(result.amount>0) setExAmount(String(result.amount));
        if(result.category) setExCat(result.category);
        if(result.merchant){setScanMerchant(result.merchant);setExNote(result.merchant);}
      } else {

                  <div key={i} style={{textAlign:"center"}}>
                    <div style={{fontSize:20,fontWeight:700,color:C.blue}}>{s.value}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2,fontWeight:600}}>{s.label}</div>
                  </div>
                ))}
              </div>
            </div>
            {notifStatus!=="granted"&&notifStatus!=="unsupported"&&(
              <button onClick={enableNotifs} style={sBtn(C.amber)}>🔔 Enable Phone Notifications</button>
            )}
            {notifStatus==="granted"&&(
              <div style={{fontSize:12,color:C.green,fontWeight:600}}>✓ Phone notifications enabled</div>
            )}
            <button onClick={onLogout} style={sBtn(C.redBg,C.red)}>Sign Out</button>
          </div>
        </Modal>
      )}

      {showTask&&(
        <Modal title={editTaskId?"Edit Task":"New Task"} onClose={()=>{setShowTask(false);setEditTaskId(null);if(recActive&&recording)recording.stop();setRecActive(false);}}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <FInput placeholder="Task title" value={nTitle} onChange={setNTitle}/>
            <FInput placeholder="Due date" value={nDue} onChange={setNDue} type="date"/>
            <FInput placeholder="Time" value={nTime} onChange={setNTime} type="time"/>
            <FSelect value={nPri} onChange={setNPri} options={["High","Medium","Low"]}/>
            <div>
              <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>🔁 Repeat</div>
              <FSelect value={nRepeat} onChange={setNRepeat} options={REPEAT_OPTS}/>
            </div>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:11,color:C.muted,fontWeight:600}}>📝 Notes</span>
                <button onClick={()=>toggleVoice(setNNotes)} style={{background:recActive?C.red:C.blueLight,color:recActive?"#fff":C.blue,border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>{recActive?"⏹ Stop":"🎤 Voice"}</button>
              </div>
              <textarea value={nNotes} onChange={e=>setNNotes(e.target.value)} placeholder="Type or use voice to add notes..." rows={4} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1px solid "+C.border,fontSize:13,color:C.text,background:C.slateLight,boxSizing:"border-box",outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
              {nNotes.trim().length>0&&(
                <button onClick={()=>doSummarize(nNotes,setNSummary)} disabled={summarizing} style={{marginTop:6,background:C.greenBg,color:C.green,border:"none",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",opacity:summarizing?0.6:1}}>{summarizing?"✨ Summarizing...":"✨ AI Summarize"}</button>
              )}
              {nSummary&&(
                <div style={{marginTop:8,background:C.greenBg,borderRadius:10,padding:10,fontSize:12,color:C.text,lineHeight:1.5}}>
                  <div style={{fontWeight:700,color:C.green,fontSize:11,marginBottom:4}}>✨ Summary</div>
                  {nSummary}
                </div>
              )}
            </div>
            <button onClick={saveTask} style={sBtn(C.blue)}>{editTaskId?"Save Changes":"Add Task"}</button>
          </div>
        </Modal>
      )}
      {showMeeting&&(
        <Modal title={editMeetingId?"Edit Meeting":"New Meeting"} onClose={()=>{setShowMeeting(false);setEditMeetingId(null);if(recActive&&recording)recording.stop();setRecActive(false);}}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <FInput placeholder="Meeting title" value={mTitle} onChange={setMTitle}/>
            <FInput placeholder="Time" value={mTime} onChange={setMTime} type="time"/>
            <FInput placeholder="Attendees" value={mPeople} onChange={setMPeople} type="number"/>
            <div>
              <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>🔁 Repeat</div>
              <FSelect value={mRepeat} onChange={setMRepeat} options={REPEAT_OPTS}/>
            </div>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:11,color:C.muted,fontWeight:600}}>📝 Meeting Notes</span>
                <button onClick={()=>toggleVoice(setMNotes)} style={{background:recActive?C.red:C.blueLight,color:recActive?"#fff":C.blue,border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>{recActive?"⏹ Stop":"🎤 Voice"}</button>
              </div>
              <textarea value={mNotes} onChange={e=>setMNotes(e.target.value)} placeholder="Dictate or type meeting notes..." rows={4} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1px solid "+C.border,fontSize:13,color:C.text,background:C.slateLight,boxSizing:"border-box",outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
              {mNotes.trim().length>0&&(
                <button onClick={()=>doSummarize(mNotes,setMSummary)} disabled={summarizing} style={{marginTop:6,background:C.greenBg,color:C.green,border:"none",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",opacity:summarizing?0.6:1}}>{summarizing?"✨ Summarizing...":"✨ AI Summarize"}</button>
              )}
              {mSummary&&(
                <div style={{marginTop:8,background:C.greenBg,borderRadius:10,padding:10,fontSize:12,color:C.text,lineHeight:1.5}}>
                  <div style={{fontWeight:700,color:C.green,fontSize:11,marginBottom:4}}>✨ Summary</div>
                  {mSummary}
                </div>
              )}
            </div>
            <button onClick={saveMeeting} style={sBtn(C.blue)}>{editMeetingId?"Save Changes":"Add Meeting"}</button>
          </div>
        </Modal>
      )}
      {showMember&&(
        <Modal title={editMemberId?"Edit Member":"Add Team Member"} onClose={()=>{setShowMember(false);setEditMemberId(null);}}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <FInput placeholder="Full name" value={mbName} onChange={setMbName}/>
            <FInput placeholder="Role / Title" value={mbRole} onChange={setMbRole}/>
            <button onClick={saveMember} style={sBtn(C.blue)}>{editMemberId?"Save Changes":"Add Member"}</button>
          </div>
        </Modal>
      )}
      {msgTarget&&<MsgModal member={msgTarget} userUid={user.uid} onClose={()=>setMsgTarget(null)}/>}

      {showExpense&&(
        <Modal title={editExpenseId?"Edit Expense":"New Expense"} onClose={()=>{setShowExpense(false);setEditExpenseId(null);setScanMerchant("");}}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {!editExpenseId&&(
              <div style={{display:"flex",gap:8}}>
                <label style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,background:C.blueLight,color:C.blue,border:"2px dashed "+C.blue,borderRadius:12,padding:"14px 8px",cursor:"pointer",fontWeight:700,fontSize:12,textAlign:"center"}}>
                  {scanning?"⏳":"📷"}
                  <span>{scanning?"Reading...":"Take Photo"}</span>
                  <input type="file" accept="image/*" capture="environment" onChange={handleReceiptPhoto} disabled={scanning} style={{display:"none"}}/>
                </label>
                <label style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,background:C.greenBg,color:C.green,border:"2px dashed "+C.green,borderRadius:12,padding:"14px 8px",cursor:"pointer",fontWeight:700,fontSize:12,textAlign:"center"}}>
                  {scanning?"⏳":"🖼️"}
                  <span>{scanning?"Reading...":"From Gallery"}</span>
                  <input type="file" accept="image/*" onChange={handleReceiptPhoto} disabled={scanning} style={{display:"none"}}/>
                </label>
              </div>
            )}
            {scanMerchant&&(
              <div style={{fontSize:11,color:C.green,fontWeight:600,textAlign:"center"}}>✓ Detected: {scanMerchant}</div>
            )}
            {exReceiptImg&&(
              <div style={{position:"relative"}}>
                <img src={exReceiptImg} alt="Receipt" style={{width:"100%",borderRadius:10,maxHeight:160,objectFit:"cover"}}/>
                <span style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,0.6)",color:"#fff",fontSize:10,padding:"3px 8px",borderRadius:20,fontWeight:600}}>📎 Attached for claims</span>
              </div>
            )}
            <div style={{display:"flex",gap:8}}>
              <div style={{flex:1}}>
                <FInput placeholder="Amount" value={exAmount} onChange={setExAmount} type="number"/>
              </div>
              <div style={{width:90}}>
                <FSelect value={exCurrency} onChange={setExCurrency} options={["AED","INR","USD"]}/>
              </div>
            </div>
            <div>
              <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>Category</div>
              <FSelect value={exCat} onChange={setExCat} options={categories}/>
            </div>
            <FInput placeholder="Date" value={exDate} onChange={setExDate} type="date"/>
            <FInput placeholder="Note (optional)" value={exNote} onChange={setExNote}/>
            <button onClick={saveExpense} style={sBtn(C.blue)}>{editExpenseId?"Save Changes":"Add Expense"}</button>
          </div>
        </Modal>
      )}

      {viewReceiptImg&&(
        <Modal title="Receipt" onClose={()=>setViewReceiptImg(null)}>
          <img src={viewReceiptImg} alt="Receipt" style={{width:"100%",borderRadius:10}}/>
          <a href={viewReceiptImg} download={"receipt-"+Date.now()+".jpg"} style={{...sBtn(C.blue),display:"block",textAlign:"center",textDecoration:"none",marginTop:12,boxSizing:"border-box"}}>⬇ Download Receipt</a>
        </Modal>
      )}

      {showCatManage&&(
        <Modal title="Manage Categories" onClose={()=>setShowCatManage(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
            {categories.map(function(cat){
              return (
                <div key={cat} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:C.slateLight,borderRadius:10}}>
                  <span style={{fontSize:16}}>{catIcon(cat)}</span>
                  <span style={{flex:1,fontSize:13,color:C.text,fontWeight:600}}>{cat}</span>
                  <button onClick={()=>deleteCategory(cat)} style={iconBtn}>🗑️</button>
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:8}}>
            <input value={newCatName} onChange={e=>setNewCatName(e.target.value)} placeholder="New category name" style={{flex:1,padding:"10px 12px",borderRadius:10,border:"1px solid "+C.border,fontSize:13,background:C.slateLight,outline:"none"}}/>
            <button onClick={addCategory} style={{background:C.blue,color:"#fff",border:"none",borderRadius:10,padding:"10px 16px",cursor:"pointer",fontWeight:700,fontSize:13}}>+ Add</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Root(){
  const [screen,setScreen]=useState(function(){return localStore.get("pd_onboarded")?"loading":"onboarding";});
  const [user,setUser]=useState(null);

  useEffect(function(){
    const unsub=window._auth.onAuthStateChanged(function(fbUser){
      if(fbUser){
        setUser({uid:fbUser.uid,name:fbUser.displayName||fbUser.email.split("@")[0],email:fbUser.email});
        setScreen("app");
      } else {
        setUser(null);
        setScreen(localStore.get("pd_onboarded")?"auth":"onboarding");
      }
    });
    return unsub;
  },[]);

  function handleLogout(){window._auth.signOut();}

  return(
    <div style={{width:"100%",maxWidth:480,height:"100vh",overflow:"hidden",display:"flex",flexDirection:"column",position:"relative",background:C.white}}>
      {screen==="loading"&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",flexDirection:"column",gap:12}}>
          <div style={{fontSize:36}}>⚡</div>
        </div>
      )}
      {screen==="onboarding"&&<Onboarding onDone={()=>{localStore.set("pd_onboarded",true);setScreen("auth");}}/>}
      {screen==="auth"&&<Auth/>}
      {screen==="app"&&user&&<MainApp user={user} onLogout={handleLogout}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
  </html>
